<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sky Barrage - Canvas Shooter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hud score-badge">Score: <span id="scoreValue">0</span></div>

  <canvas id="gameCanvas" aria-label="2D shooting game"></canvas>

  <div id="scoreModal" class="score-modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="score-card">
      <h2 id="modalTitle">Game Over!</h2>
      <p class="final-score">Final Score: <strong id="finalScoreValue">0</strong></p>

      <label for="playerNameInput">Enter your name:</label>
      <input id="playerNameInput" type="text" maxlength="16" placeholder="Player name" />

      <div class="score-actions">
        <button id="saveScoreBtn" type="button">Save Score</button>
        <button id="restartBtn" type="button" class="secondary">Restart Game</button>
      </div>

      <p id="saveMessage" class="save-message"></p>

      <div class="score-list-wrap">
        <h3>Top Scores</h3>
        <table class="score-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="scoreTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
